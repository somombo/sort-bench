[[components]]
name = "csharp"
type = "executor"

[components.build]
command = "dotnet"
args = [
  "publish",
  "-c",
  "Release",
  "-p:PublishAot=false",
  "-p:TieredCompilation=false",
  "-p:ServerGarbageCollection=true",
]

[components.run]
command = "dotnet"
args = [
  "bin/Release/net9.0/publish/AlgoCSharpSorter.dll",
]

