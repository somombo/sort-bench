<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Row Count</title>
  </head>
  <body>
    <script type="module">
      import * as duckdb from 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.32.0/+esm'

      const bundle = await duckdb.selectBundle(duckdb.getJsDelivrBundles())

      // Web Workers require a local Blob URL to load cross-origin scripts from a CDN
      const workerBlob = new Blob([`importScripts("${bundle.mainWorker}");`], {
        type: 'text/javascript',
      })
      const workerUrl = URL.createObjectURL(workerBlob)

      const db = new duckdb.AsyncDuckDB(
        new duckdb.ConsoleLogger(),
        new Worker(workerUrl),
      )
      await db.instantiate(bundle.mainModule, bundle.pthreadWorker)
      URL.revokeObjectURL(workerUrl)

      const conn = await db.connect()
      const parquetRes = await fetch('benchmark_data.parquet')
      await db.registerFileBuffer(
        'data.parquet',
        new Uint8Array(await parquetRes.arrayBuffer()),
      )

      const result = await conn.query(
        'SELECT count(*) as c FROM "data.parquet"',
      )
      document.body.innerText = result.toArray()[0].toJSON().c

      await conn.close()
      await db.terminate()
    </script>
  </body>
</html>
